name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go version && go env GOTOOLCHAIN GOROOT
      - name: Detect Go sources
        id: gofiles
        run: |
          if [ -n "$(git ls-files '*.go' | head -n1)" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Go sources yet — skipping lint."
          fi
      - if: steps.gofiles.outputs.present == 'true'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go version && go env GOTOOLCHAIN GOROOT
      - name: Detect Go sources
        id: gofiles
        run: |
          if [ -n "$(git ls-files '*.go' | head -n1)" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Go sources yet — skipping tests."
          fi
      - if: steps.gofiles.outputs.present == 'true'
        run: go test -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
