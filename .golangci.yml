version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - gosec
    - misspell
    - nakedret
    - revive
    - unconvert
    - unparam
  exclusions:
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - revive

formatters:
  enable:
    - gofmt
    - goimports
