apiVersion: keel/v1
name: webhook
version: 0.1.0
summary: HMAC webhook signature verification with Stripe, Paystack, Flutterwave, and Nomba presets.
tags: [payments, security]

requires: []
conflicts: []

# All optional: a project only wires up the providers it actually
# integrates with, not all four.
env:
  - name: STRIPE_WEBHOOK_SECRET
    description: Stripe webhook signing secret, used to verify Stripe-Signature headers.
    required: false
  - name: PAYSTACK_SECRET_KEY
    description: Paystack secret key, used to verify x-paystack-signature headers.
    required: false
  - name: FLUTTERWAVE_SECRET_HASH
    description: Flutterwave secret hash, used to verify verif-hash headers.
    required: false
  - name: NOMBA_SECRET_KEY
    description: Nomba secret key, used to verify webhook signatures.
    required: false

languages:
  go:
    templates:
      - from: templates/go/webhook/webhook.go.tmpl
        to: internal/webhook/webhook.go
      - from: templates/go/webhook/stripe.go.tmpl
        to: internal/webhook/stripe.go
      - from: templates/go/webhook/paystack.go.tmpl
        to: internal/webhook/paystack.go
      - from: templates/go/webhook/flutterwave.go.tmpl
        to: internal/webhook/flutterwave.go
      - from: templates/go/webhook/nomba.go.tmpl
        to: internal/webhook/nomba.go
      - from: templates/go/webhook/webhook_test.go.tmpl
        to: internal/webhook/webhook_test.go
      - from: templates/go/webhook/stripe_test.go.tmpl
        to: internal/webhook/stripe_test.go
      - from: templates/go/webhook/paystack_test.go.tmpl
        to: internal/webhook/paystack_test.go
      - from: templates/go/webhook/flutterwave_test.go.tmpl
        to: internal/webhook/flutterwave_test.go
      - from: templates/go/webhook/nomba_test.go.tmpl
        to: internal/webhook/nomba_test.go
