apiVersion: keel/v1
name: observability
version: 0.1.0
summary: "pprof profiling, Prometheus-backed metrics, and a version/info endpoint."
tags: [reliability, observability]

requires: []
conflicts: []

languages:
  go:
    dependencies:
      - module: github.com/prometheus/client_golang
        version: v1.23.2
    templates:
      - from: templates/go/observability/pprof.go.tmpl
        to: internal/observability/pprof.go
      - from: templates/go/observability/pprof_test.go.tmpl
        to: internal/observability/pprof_test.go
      - from: templates/go/observability/metrics.go.tmpl
        to: internal/observability/metrics.go
      - from: templates/go/observability/metrics_test.go.tmpl
        to: internal/observability/metrics_test.go
